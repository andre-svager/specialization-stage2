---
# ConfigMaps for SQL scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-db-init-script
  namespace: togglemaster
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS api_keys (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        
        -- key_hash armazena o hash SHA-256 da chave, que tem 64 caracteres hexadecimais
        key_hash VARCHAR(64) NOT NULL UNIQUE, 
        
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flag-db-init-script
  namespace: togglemaster
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS flags (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) UNIQUE NOT NULL, 
        description TEXT,
        is_enabled BOOLEAN NOT NULL DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON flags;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON flags
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: target-db-init-script
  namespace: togglemaster
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS targeting_rules (
        id SERIAL PRIMARY KEY,
        flag_name VARCHAR(100) UNIQUE NOT NULL,
        is_enabled BOOLEAN NOT NULL DEFAULT true,
        rules JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON targeting_rules
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();

---
# Auth Database Init Job
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-db-init-job
  namespace: togglemaster
spec:
  template:
    spec:
      containers:
      - name: psql
        image: postgres:15
        command:
          - /bin/sh
          - -c
          - |
            echo "Connecting to Auth DB..."
            psql -h tm-db.cgx4okc4isem.us-east-1.rds.amazonaws.com \
                 -U postgres \
                 -d auth_db \
                 -f /scripts/init.sql && echo "Auth DB initialized successfully!"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: postgres_password
        volumeMounts:
        - name: sql-scripts
          mountPath: /scripts
      volumes:
      - name: sql-scripts
        configMap:
          name: auth-db-init-script
      restartPolicy: Never
  backoffLimit: 3

